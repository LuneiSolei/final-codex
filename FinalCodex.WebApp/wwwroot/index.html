<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FinalCodex.WebApp</title>
    <base href="/" />
    <link id="webassembly" rel="preload" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="FinalCodex.WebApp.styles.css" rel="stylesheet" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="FinalCodex.WebApp.styles.css" rel="stylesheet" /> -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
          rel="stylesheet" />
    <!-- IMPORTANT: Increment the version parameter whenever we update MudBlazor to prevent caching issues -->
    <link href="_content/MudBlazor/MudBlazor.min.css?v=1" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle cx="50%" cy="50%" r="40%" />
            <circle cx="50%" cy="50%" r="40%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a class="reload" href=".">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <!-- IMPORTANT: Increment the version parameter whenever we update MudBlazor to prevent caching issues -->
    <script src="_content/MudBlazor/MudBlazor.min.js?v=1"></script>
</body>

</html>
